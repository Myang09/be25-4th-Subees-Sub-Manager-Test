apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: subees
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Myang09/be25-4th-Subees-Sub-Manager-Test.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: subees
  syncPolicy:
    automated:
      prune: true
      selfHeal: true